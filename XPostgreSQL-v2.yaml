apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xpostgresqls.database.example.org
spec:
  group: database.example.org
  names:
    kind: XPostgreSQL
    plural: xpostgresqls
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              storageSize:
                type: string
                description: "Size of the PostgreSQL storage (e.g., '10Gi')"
                default: "10Gi"
              version:
                type: string
                description: "PostgreSQL version"
                default: "15"
              replicas:
                type: integer
                description: "Number of PostgreSQL replicas"
                default: 1
              databaseName:
                type: string
                description: "Name of the database to create"
                default: "postgres"
              username:
                type: string
                description: "Database username"
                default: "postgres"
            required:
            - storageSize
            - version
            - replicas
            - databaseName
            - username
          status:
            type: object
            properties:
              connectionString:
                type: string
                description: "Database connection string"
              endpoint:
                type: string
                description: "Database endpoint"
              port:
                type: integer
                description: "Database port"
    additionalPrinterColumns:
    - name: STORAGE
      type: string
      jsonPath: .spec.storageSize
    - name: VERSION
      type: string
      jsonPath: .spec.version
    - name: REPLICAS
      type: integer
      jsonPath: .spec.replicas
    - name: READY
      type: string
      jsonPath: .status.conditions[?(@.type=='Ready')].status
    - name: SYNCED
      type: string
      jsonPath: .status.conditions[?(@.type=='Synced')].status
