# tests/e2e/gke/gateway/00-assert.yaml
# Assert the Traefik Gateway is Programmed (listeners are valid and active).
# The Gateway lives in kube-system and is owned by Vegvísir (Nidavellir).
# GKE-only: homelab uses Traefik IngressRoutes rather than Gateway API.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: kube-system
status:
  conditions:
  - type: Accepted
    status: "True"
  - type: Programmed
    status: "True"
