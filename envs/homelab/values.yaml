
# Homelab Environment Values

global:
  environment: homelab
  domain: "homelab.local"

# Layer 4: Fundamentals
traefik:
  serviceType: LoadBalancer
  enableDashboard: true

# No cert-manager in homelab, at least not yet

crossplane:
  provider: "noop" # Or local helm provider - installed via Argo
  bucketStorageClass: "local-path"
