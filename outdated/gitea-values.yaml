# Gitea configuration for SQLite with proper SSH setup
persistence:
  enabled: true
  size: 10Gi

# Disable PostgreSQL and Redis for simplicity
postgresql-ha:
  enabled: false

valkey:
  enabled: false

memcached:
  enabled: false

# Configure Gitea for SQLite
gitea:
  config:
    database:
      DB_TYPE: sqlite3
      PATH: /data/gitea/gitea.db
    server:
      SSH_DOMAIN: localhost
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 2222
      DISABLE_SSH: false
    session:
      PROVIDER: file
    cache:
      ADAPTER: memory

# Configure services
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: LoadBalancer  
    port: 2222
    targetPort: 2222

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: gitea.local
      paths:
        - path: /
          pathType: Prefix

