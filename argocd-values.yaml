# Argo CD configuration for local development
global:
  # Domain configuration for localhost access
  domain: localhost:8080

server:
  # Configure server for insecure mode (easier for local development)
  insecure: true
  
  # Service configuration
  service:
    type: ClusterIP
    
  # Ingress disabled for port-forward access
  ingress:
    enabled: false
    
  # Server configuration
  config:
    # Set the base URL for localhost access
    url: "https://localhost:8080"
    
    # Enable insecure mode
    "server.insecure": "true"
    
    # Application settings
    "application.instanceLabelKey": "argocd.argoproj.io/instance"

# Disable Dex (OIDC) for simpler local setup
dex:
  enabled: false

# Configure notifications
notifications:
  enabled: true

# Configure applicationSet controller
applicationSet:
  enabled: true

# Redis configuration
redis:
  enabled: true
