apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://traefik.github.io/charts'
    chart: traefik
    # PINNED to the 3.6.x chart line (38.x). Do NOT bump to chart 40.x /
    # Traefik 3.7.x without re-testing TLS: Traefik 3.7.x regressed the
    # Kubernetes Gateway provider's certificate loading — a Gateway listener's
    # `certificateRefs` Secret is not loaded into the TLS store, so every
    # HTTPS host serves the self-signed default cert. Verified broken on
    # 3.7.1, working on 3.6.5. See SiliconSaga/yggdrasil#65.
    targetRevision: 38.0.1
    helm:
      # We just set generic values here. The App-of-Apps or Argo overrides
      # will handle the environment specific values (LoadBalancer vs NodePort)
      values: |
        providers:
          kubernetesGateway:
            enabled: true
        gateway:
          # Disable the chart's auto-created Gateway resource.
          # The Gateway is owned by Vegvísir (Nidavellir) so that TLS config
          # and cert-manager integration are co-located with the ClusterIssuers.
          enabled: false
        ports:
          web:
            exposedPort: 80
            # Allow encoded `#` (%23) in URL paths.
            # Required for Matrix Synapse and other APIs that put room aliases
            # like #room:server in path segments. Traefik 3.6.4+ rejects these
            # by default (CVE hardening). Safe for our use cases.
            # See: https://doc.traefik.io/traefik/security/request-path/
            http:
              encodedCharacters:
                allowEncodedHash: true
          websecure:
            exposedPort: 443
            http:
              encodedCharacters:
                allowEncodedHash: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
