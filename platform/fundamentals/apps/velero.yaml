apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://vmware-tanzu.github.io/helm-charts'
    chart: velero
    targetRevision: 11.3.1 # Corresponds to Velero v1.17.1
    helm:
      values: |
        kubectl:
          image:
            tag: "1.32.2" # Tries to match Kubernetes version, but Bitnami changed their image policy
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.9.0
            volumeMounts:
              - mountPath: /target
                name: plugins
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero-backups
              config:
                # We set region to "garage" just to satisfy SDK validation - may need to revisit later or use a real region?
                region: garage
                s3ForcePathStyle: true
                # We use the internal service DNS for whichever storage provider we have (Garage)
                # In GKE, this URL is overridden to https://storage.googleapis.com
                s3Url: http://garage.garage.svc.cluster.local:3900  
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: garage
        credentials:
          useSecret: true
          existingSecret: velero-credentials
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
