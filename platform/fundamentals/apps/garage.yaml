apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://charts.k8s-at-home.com' # TODO: Or garage specific provider if available, this is placeholder
    chart: garage
    targetRevision: 0.8.0
    helm:
      values: |
        persistence:
          enabled: true
          size: 10Gi
        s3Api:
          enabled: true
          port: 3900
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
