# Crossplane ProviderConfigs and namespace-management RBAC.
# Sync-wave 10: must wait for provider CRDs to be registered (wave 5).
# ArgoCD selfHeal will retry if CRDs aren't ready yet.
---
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  credentials:
    source: InjectedIdentity
---
apiVersion: helm.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  credentials:
    source: InjectedIdentity
---
# Allow Crossplane core to manage namespaces (for XR-created namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-namespace-manager
  annotations:
    argocd.argoproj.io/sync-wave: "10"
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-namespace-manager
  annotations:
    argocd.argoproj.io/sync-wave: "10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-namespace-manager
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane
