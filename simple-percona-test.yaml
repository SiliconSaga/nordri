# Simple PerconaPGCluster test to verify the operator works
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: simple-test
  namespace: percona-postgresql
spec:
  crVersion: "2.7.0"
  image: "docker.io/percona/percona-postgresql-operator:2.7.0-ppg15.5.2-postgres"
  postgresVersion: 15
  instances:
  - name: instance1
    replicas: 1
    dataVolumeClaimSpec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: "1Gi"
      storageClassName: local-path
  backups:
    enabled: false  # Disable backups for simple test
