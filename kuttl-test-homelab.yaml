# nordri/kuttl-test-homelab.yaml
# Run: kubectl kuttl test --config kuttl-test-homelab.yaml
# Covers: ArgoCD apps, Crossplane providers/functions, Velero (shared);
#         Longhorn storage, Garage S3 (homelab-only)
apiVersion: kuttl.dev/v1beta1
kind: TestSuite
testDirs:
  - tests/e2e/shared
  - tests/e2e/homelab
timeout: 120
parallel: 1
skipDelete: false
