# Crossplane RBAC Configuration
# This file contains the necessary RBAC permissions for Crossplane to manage
# namespaces and Percona PostgreSQL resources

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-namespace-manager
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-namespace-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-namespace-manager
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-percona-manager
rules:
- apiGroups: ["pgv2.percona.com"]
  resources: ["perconapgclusters", "perconapgbackups", "perconapgrestores", "perconapgupgrades"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["pgv2.percona.com"]
  resources: ["perconapgclusters/status", "perconapgbackups/status", "perconapgrestores/status", "perconapgupgrades/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-percona-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-percona-manager
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system
